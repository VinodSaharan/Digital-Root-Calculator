<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vinod Saharan | Digital Root Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0a0f1f,#0f2c6b,#081120);
    padding:20px;
}

.container{
    width:100%;
    max-width:520px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:25px;
    padding:35px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.5);
}

/* VS Logo */

.logo{
    width:130px;
    height:130px;
    margin:auto;
    border-radius:25px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:60px;
    font-weight:900;

    color:#ffffff;

    background:linear-gradient(
        145deg,
        #58c4ff,
        #0066ff
    );

    box-shadow:
        0 0 25px #2196f3,
        inset 0 3px 10px rgba(255,255,255,.4);

    transform:rotate(-5deg);

    text-shadow:
        2px 2px 5px rgba(0,0,0,.4);

    margin-bottom:20px;
}

.logo span{
    transform:rotate(5deg);
}

/* Branding */

.brand-name{
    color:white;
    font-size:30px;
    font-weight:bold;
}

.brand-sub{
    color:#bcd6ff;
    margin-top:5px;
    margin-bottom:25px;
}

/* Heading */

.title{
    color:white;
    font-size:28px;
}

.subtitle{
    color:#dbeafe;
    margin-top:10px;
    margin-bottom:25px;
}

/* Input */

.input-box{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    outline:none;
    font-size:20px;
    text-align:center;
}

/* Button */

.btn{
    width:100%;
    margin-top:15px;
    padding:15px;

    border:none;
    border-radius:15px;

    color:white;
    font-size:18px;
    font-weight:bold;

    cursor:pointer;

    background:linear-gradient(
        135deg,
        #00c6ff,
        #0072ff
    );

    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);

    box-shadow:
    0 10px 25px
    rgba(0,114,255,.4);
}

/* Result */

.result{
    display:none;

    margin-top:25px;

    padding:20px;

    border-radius:20px;

    background:rgba(255,255,255,.08);
}

.result h3{
    color:white;
}

.answer{
    font-size:60px;
    color:#00ff88;
    font-weight:bold;
    margin-top:10px;
}

/* Footer */

.footer{
    margin-top:25px;
    color:#cbd5e1;
    font-size:13px;
}

.footer span{
    color:#00c6ff;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <span>VS</span>
    </div>

    <div class="brand-name">
        Vinod Saharan
    </div>

    <div class="brand-sub">
        Official Calculator Tool
    </div>

    <h1 class="title">
        🔢 Digital Root Calculator
    </h1>

    <p class="subtitle">
        Enter up to 12 digits and get the final
        single digit result instantly.
    </p>

    <input
        type="text"
        maxlength="12"
        id="numberInput"
        class="input-box"
        placeholder="123456789123">

    <button
        class="btn"
        onclick="calculateRoot()">
        Calculate Result
    </button>

    <div
        class="result"
        id="resultBox">

        <h3>Single Digit Result</h3>

        <div
            class="answer"
            id="answer">
            0
        </div>

    </div>

    <div class="footer">
        © 2026 <span>Vinod Saharan</span><br>
        Made with ❤️ in India 🇮🇳
    </div>

</div>

<script>

function calculateRoot(){

    let num =
    document.getElementById(
        "numberInput"
    ).value.trim();

    if(!/^\d+$/.test(num)){
        alert(
        "Please enter digits only."
        );
        return;
    }

    let total =
    [...num].reduce(
        (sum,d)=>
        sum + Number(d),
        0
    );

    while(total > 9){

        total =
        String(total)
        .split('')
        .reduce(
            (sum,d)=>
            sum + Number(d),
            0
        );
    }

    document.getElementById(
        "answer"
    ).innerText = total;

    document.getElementById(
        "resultBox"
    ).style.display = "block";
}

</script>

</body>
</html>
