<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vinod Saharan | Digital Root Calculator</title>

<meta name="author" content="Vinod Saharan">
<meta name="description" content="Digital Root Calculator by Vinod Saharan">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#0f172a);
    padding:20px;
}

.container{
    width:100%;
    max-width:520px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.15);

    border-radius:25px;
    padding:35px;

    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,.4);
}

/* Logo Area */

.brand{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-bottom:20px;
}

.logo-img{
    width:120px;
    height:120px;
    object-fit:contain;
    margin-bottom:12px;
    filter:drop-shadow(0 0 18px #2196f3);
}

.brand h2{
    color:#fff;
    font-size:28px;
    margin-bottom:5px;
}

.brand p{
    color:#cbd5e1;
    font-size:14px;
    letter-spacing:1px;
}

/* Title */

.title{
    color:white;
    font-size:30px;
    margin-top:15px;
}

.subtitle{
    color:#dbeafe;
    margin-top:10px;
    margin-bottom:25px;
    line-height:1.6;
}

/* Input */

.input-box{
    width:100%;
    padding:16px;

    border:none;
    outline:none;

    border-radius:15px;

    text-align:center;
    font-size:20px;

    margin-bottom:15px;
}

/* Button */

.btn{
    width:100%;
    padding:16px;

    border:none;
    border-radius:15px;

    cursor:pointer;

    font-size:18px;
    font-weight:bold;

    color:white;

    background:linear-gradient(
        135deg,
        #00c6ff,
        #0072ff
    );

    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);

    box-shadow:
    0 10px 25px
    rgba(0,114,255,.45);
}

/* Result */

.result-box{
    display:none;

    margin-top:25px;

    background:rgba(255,255,255,.08);

    border-radius:20px;

    padding:20px;
}

.result-box h3{
    color:white;
    margin-bottom:10px;
}

.answer{
    color:#00ff88;

    font-size:60px;
    font-weight:bold;
}

/* Footer */

.footer{
    margin-top:25px;

    color:#cbd5e1;
    font-size:13px;
}

.footer span{
    color:#00c6ff;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

    <div class="brand">

        <img
        src="vs-logo.png"
        alt="VS Logo"
        class="logo-img">

        <h2>Vinod Saharan</h2>
        <p>Official Calculator Tool</p>

    </div>

    <h1 class="title">
        🔢 Digital Root Calculator
    </h1>

    <p class="subtitle">
        Enter up to 12 digits and get the final
        Single Digit Result instantly.
    </p>

    <input
    type="text"
    maxlength="12"
    id="numberInput"
    class="input-box"
    placeholder="123456789123">

    <button
    class="btn"
    onclick="calculateRoot()">
        Calculate Result
    </button>

    <div
    class="result-box"
    id="resultBox">

        <h3>Single Digit Result</h3>

        <div
        class="answer"
        id="answer">
            0
        </div>

    </div>

    <div class="footer">
        © 2026 <span>Vinod Saharan</span><br>
        Made with ❤️ in India 🇮🇳
    </div>

</div>

<script>

function calculateRoot(){

    let num =
    document
    .getElementById("numberInput")
    .value
    .trim();

    if(!/^\d+$/.test(num)){
        alert("Please enter digits only.");
        return;
    }

    let total =
    [...num]
    .reduce(
        (sum,d)=>
        sum + Number(d),
        0
    );

    while(total > 9){

        total =
        String(total)
        .split('')
        .reduce(
            (sum,d)=>
            sum + Number(d),
            0
        );
    }

    document
    .getElementById("answer")
    .innerText = total;

    document
    .getElementById("resultBox")
    .style.display = "block";
}

</script>

</body>
</html>
