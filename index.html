<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Root Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    width:90%;
    max-width:450px;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    text-align:center;
}

h1{
    color:#333;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
}

.input-box{
    width:100%;
    padding:15px;
    border:2px solid #4facfe;
    border-radius:12px;
    font-size:18px;
    outline:none;
    transition:.3s;
}

.input-box:focus{
    border-color:#007bff;
    box-shadow:0 0 10px rgba(0,123,255,.3);
}

.btn{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#4facfe,#007bff);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(0,123,255,.3);
}

.result{
    margin-top:25px;
    padding:20px;
    border-radius:15px;
    background:#f5f8ff;
    display:none;
}

.result h2{
    color:#007bff;
    margin-bottom:10px;
}

.answer{
    font-size:42px;
    font-weight:bold;
    color:#28a745;
}

.footer{
    margin-top:20px;
    color:#777;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

    <h1>🔢 Digital Root Calculator</h1>
    <p class="subtitle">
        12 अंकों तक की संख्या दर्ज करें और अंतिम Single Digit Result प्राप्त करें
    </p>

    <input
        type="text"
        id="numberInput"
        maxlength="12"
        class="input-box"
        placeholder="उदाहरण: 123456789123">

    <button class="btn" onclick="calculateRoot()">
        Calculate Result
    </button>

    <div class="result" id="resultBox">
        <h2>Single Digit Result</h2>
        <div class="answer" id="answer">0</div>
    </div>

    <div class="footer">
        Made with ❤️ using HTML, CSS & JavaScript
    </div>

</div>

<script>

function calculateRoot(){

    let num = document.getElementById("numberInput").value.trim();

    if(!/^\d+$/.test(num)){
        alert("कृपया केवल अंक दर्ज करें।");
        return;
    }

    let total = [...num].reduce((sum,d)=>sum + Number(d),0);

    while(total > 9){
        total = String(total)
            .split('')
            .reduce((sum,d)=>sum + Number(d),0);
    }

    document.getElementById("answer").innerText = total;
    document.getElementById("resultBox").style.display = "block";
}

</script>

</body>
</html>
