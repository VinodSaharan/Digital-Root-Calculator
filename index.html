<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vinod Saharan - Digital Root Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141e30,#243b55);
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.15);

    border-radius:25px;
    padding:30px;

    text-align:center;

    box-shadow:0 15px 35px rgba(0,0,0,.35);
}

/* Brand Section */

.brand{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    margin-bottom:20px;
}

.logo{
    width:75px;
    height:75px;
    border-radius:50%;
    background:linear-gradient(135deg,#ff9800,#ff5722);

    display:flex;
    align-items:center;
    justify-content:center;

    color:#fff;
    font-size:30px;
    font-weight:bold;

    box-shadow:0 10px 20px rgba(255,87,34,.35);
}

.brand-text h2{
    color:#fff;
    font-size:28px;
}

.brand-text p{
    color:#ddd;
    font-size:14px;
}

/* Heading */

h1{
    color:#fff;
    margin-top:10px;
    margin-bottom:10px;
}

.description{
    color:#ddd;
    margin-bottom:25px;
    line-height:1.5;
}

/* Input */

.input-box{
    width:100%;
    padding:15px;

    border:none;
    outline:none;

    border-radius:15px;

    font-size:18px;
    text-align:center;

    margin-bottom:15px;
}

/* Button */

.btn{
    width:100%;
    padding:15px;

    border:none;
    border-radius:15px;

    font-size:18px;
    font-weight:bold;

    cursor:pointer;

    color:white;

    background:linear-gradient(
    135deg,
    #00c6ff,
    #0072ff
    );

    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,114,255,.4);
}

/* Result */

.result-box{
    display:none;

    margin-top:25px;

    background:rgba(255,255,255,.1);

    border-radius:20px;

    padding:20px;
}

.result-box h3{
    color:#fff;
}

.answer{
    font-size:55px;
    font-weight:bold;
    color:#00ff88;

    margin-top:10px;
}

/* Footer */

.footer{
    margin-top:25px;

    color:#ccc;
    font-size:13px;
}

.footer span{
    color:#00ff88;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

    <div class="brand">

        <div class="logo">
            VS
        </div>

        <div class="brand-text">
            <h2>Vinod Saharan</h2>
            <p>Official Calculator Tool</p>
        </div>

    </div>

    <h1>🔢 Digital Root Calculator</h1>

    <div class="description">
        12 अंकों तक की संख्या दर्ज करें और उसका अंतिम
        Single Digit Result प्राप्त करें।
    </div>

    <input
        type="text"
        maxlength="12"
        id="numberInput"
        class="input-box"
        placeholder="123456789123">

    <button
        class="btn"
        onclick="calculateRoot()">
        Calculate Result
    </button>

    <div class="result-box" id="resultBox">

        <h3>Single Digit Result</h3>

        <div class="answer" id="answer">
            0
        </div>

    </div>

    <div class="footer">
        © 2026 <span>Vinod Saharan</span><br>
        All Rights Reserved
    </div>

</div>

<script>

function calculateRoot(){

    let num =
    document
    .getElementById("numberInput")
    .value
    .trim();

    if(!/^\d+$/.test(num)){
        alert("कृपया केवल अंक दर्ज करें");
        return;
    }

    let total =
    [...num]
    .reduce(
        (sum,d)=>
        sum + Number(d),
        0
    );

    while(total > 9){

        total =
        String(total)
        .split('')
        .reduce(
            (sum,d)=>
            sum + Number(d),
            0
        );
    }

    document
    .getElementById("answer")
    .innerText = total;

    document
    .getElementById("resultBox")
    .style.display = "block";
}

</script>

</body>
</html>
