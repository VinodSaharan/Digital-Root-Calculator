<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vinod Saharan | Digital Root Calculator</title>

<meta name="author" content="Vinod Saharan">
<meta name="description" content="Digital Root Calculator by Vinod Saharan">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#081120,#0f2c6b,#0a0f1f);
    padding:20px;
}

.container{
    width:100%;
    max-width:550px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    padding:35px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.45);
}

/* Logo */

.logo-img{
    width:140px;
    height:140px;
    object-fit:contain;
    display:block;
    margin:0 auto 15px;
    filter:drop-shadow(0 0 25px #2196f3);
}

/* Branding */

.brand-name{
    color:#fff;
    font-size:30px;
    font-weight:700;
}

.brand-sub{
    color:#bcd6ff;
    margin-top:5px;
    margin-bottom:25px;
}

/* Title */

.title{
    color:#fff;
    margin-bottom:10px;
}

.subtitle{
    color:#dbeafe;
    margin-bottom:25px;
    line-height:1.6;
}

/* Input */

.input-box{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:15px;
    font-size:20px;
    text-align:center;
}

/* Button */

.btn{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    color:#fff;
    font-size:18px;
    font-weight:bold;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,114,255,.4);
}

/* Result */

.result{
    display:none;
    margin-top:25px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,.08);
}

.result h3{
    color:#fff;
}

.answer{
    font-size:60px;
    font-weight:bold;
    color:#00ff88;
    margin-top:10px;
}

/* Footer */

.footer{
    margin-top:25px;
    color:#cbd5e1;
    font-size:13px;
}

.footer span{
    color:#00c6ff;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <!-- VS Logo PNG -->
    <img src="vs-logo.png" alt="VS Logo" class="logo-img">

    <div class="brand-name">
        Vinod Saharan
    </div>

    <div class="brand-sub">
        Official Calculator Tool
    </div>

    <h1 class="title">
        🔢 Digital Root Calculator
    </h1>

    <p class="subtitle">
        Enter up to 12 digits and get the final
        Single Digit Result instantly.
    </p>

    <input
        type="text"
       
        id="numberInput"
        class="input-box"
        placeholder="123456789123">

    <button class="btn" onclick="calculateRoot()">
        Calculate Result
    </button>

    <div class="result" id="resultBox">
        <h3>Single Digit Result</h3>
        <div class="answer" id="answer">0</div>
    </div>

    <div class="footer">
        © 2026 <span>Vinod Saharan</span><br>
        Made with ❤️ in India 🇮🇳
    </div>

</div>

<script>

function calculateRoot(){

    let num = document
        .getElementById("numberInput")
        .value
        .trim();

    if(!/^\d+$/.test(num)){
        alert("Please enter digits only.");
        return;
    }

    let total = [...num]
        .reduce((sum,d)=>sum + Number(d),0);

    while(total > 9){
        total = String(total)
            .split('')
            .reduce((sum,d)=>sum + Number(d),0);
    }

    document.getElementById("answer").innerText = total;
    document.getElementById("resultBox").style.display = "block";
}

</script>

</body>
</html>
